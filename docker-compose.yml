services:
  app:
    build: .
    image: doc-pipeline:latest
    container_name: doc-pipeline
    restart: unless-stopped
    environment:
      # SQLite file lives on the mounted volume so data survives restarts.
      - DATABASE_URL=file:/data/app.db
      # Bootstrap admins — always treated as Admin regardless of stored role.
      - ADMIN_EMAILS=${ADMIN_EMAILS:-na.thanabodee@gmail.com}
      # Seed the demo project once, only if the database is empty.
      - SEED_ON_EMPTY=${SEED_ON_EMPTY:-true}
      - NODE_ENV=production
    volumes:
      - pipeline-data:/data
    # Not published to the host — Cloudflare Tunnel reaches it over the
    # internal Docker network. For local testing, uncomment:
    # ports:
    #   - "3000:3000"
    expose:
      - "3000"

  # Cloudflare Tunnel — exposes the app at your domain with no open ports.
  # Create a tunnel in Cloudflare Zero Trust, point a public hostname
  # (e.g. pipeline.bboybezz.xyz) to http://app:3000, and paste the token below.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: doc-pipeline-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  pipeline-data:
