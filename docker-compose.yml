services:
  app:
    build: .
    image: doc-pipeline:latest
    container_name: doc-pipeline
    restart: unless-stopped
    environment:
      # Postgres over the internal Docker network. DIRECT_URL is used by
      # `prisma db push`/migrations; both point at the same instance (no external
      # pooler needed at this scale).
      - DATABASE_URL=postgresql://docpipe:${POSTGRES_PASSWORD}@postgres:5432/docpipe
      - DIRECT_URL=postgresql://docpipe:${POSTGRES_PASSWORD}@postgres:5432/docpipe
      # Persistent data volume for uploaded attachments + the seed marker.
      - DATA_DIR=/data
      - UPLOAD_DIR=/data/uploads
      # Bootstrap admins — always treated as Admin regardless of stored role.
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      # Seed the demo project once, only if the database is empty.
      - SEED_ON_EMPTY=${SEED_ON_EMPTY:-true}
      - NODE_ENV=production
    volumes:
      - pipeline-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    # Not published to the host — Cloudflare Tunnel reaches it over the
    # internal Docker network. For local testing, uncomment:
    # ports:
    #   - "3000:3000"
    expose:
      - "3000"

  # Postgres — internal only (never published; reached over the Docker network).
  postgres:
    image: postgres:16-alpine
    container_name: doc-pipeline-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=docpipe
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=docpipe
    volumes:
      - pg-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docpipe -d docpipe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cloudflare Tunnel — exposes the app at your domain with no open ports.
  # Create a tunnel in Cloudflare Zero Trust, point a public hostname
  # (your public hostname) to http://app:3000, and paste the token below.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: doc-pipeline-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  pipeline-data:
  pg-data:
